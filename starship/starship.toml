add_newline = true

[character]
success_symbol = '\$'
error_symbol = '\$'

[directory]
style = 'bold white'
truncate_to_repo = false
truncation_length = 20
truncation_symbol = '.../'

[direnv]
disabled = false
allowed_msg = '👍'
denied_msg = '🙅'
loaded_msg = '⚡️'
not_allowed_msg = '👎'
symbol = '📂'
unloaded_msg = '💤'

[gcloud]
format = '[g$symbol$account(@$domain)(\($project\))]($style) '

[git_branch]
style = 'yellow'

[git_metrics]
disabled = false

[git_status]
modified = '𝚫 '
untracked = '？'
staged = '🥡'
style = 'bold yellow'

[java]
style = 'dimmed yellow'

[kubernetes]
disabled = false

[mise]
disabled = false

[package]
format = '[$symbol$version]($style) '
style = 'dimmed yellow'

[status]
disabled = false
success_symbol = '✓ '
success_style = 'bold green'
symbol = '𐄂 '
failure_style = 'bold red'
map_symbol = true

[sudo]
disabled = false
